<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Чорний Архів</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060402}
canvas{display:block;max-width:100%;height:auto}
</style></head><body>
<canvas id="c"></canvas>
<script>
const cv=document.getElementById('c');
const W=1560,H=660;
cv.width=W;cv.height=H;
const g=cv.getContext('2d');

const BG='#060402',FL='#3a2e1e',OUT='#7a6a40',OUTA='#c8a840',
TX='#c8b888',TD='#786a48',GO='#c8a840',GD='#786030',
RE='#cc2828',RD='#8b0000',BL='#2a5a9a',BF='#0a1828';

function bx(x,y,w,h,f=FL,o=OUT,lw=2){
  g.fillStyle=f;g.strokeStyle=o;g.lineWidth=lw;
  g.fillRect(x,y,w,h);g.strokeRect(x+lw/2,y+lw/2,w-lw,h-lw);
  // кам'яна текстура
  g.save();g.strokeStyle='rgba(6,4,2,0.35)';g.lineWidth=0.5;
  for(let i=16;i<w;i+=16){g.beginPath();g.moveTo(x+i,y);g.lineTo(x+i,y+h);g.stroke()}
  for(let i=16;i<h;i+=16){g.beginPath();g.moveTo(x,y+i);g.lineTo(x+w,y+i);g.stroke()}
  g.restore();
}
function cr(x,y,w,h){bx(x,y,w,h,FL,OUT,1)}
function t(x,y,s,c=TX,sz=9,bo=0,al='center',it=0){
  g.fillStyle=c;g.textAlign=al;
  g.font=`${it?'italic ':''  }${bo?'bold ':''  }${sz}px Georgia`;
  g.fillText(s,x,y);
}
function badge(x,y,s){
  g.fillStyle=GD;g.strokeStyle=GO;g.lineWidth=1;
  g.beginPath();g.arc(x,y,9,0,Math.PI*2);g.fill();g.stroke();
  t(x,y+3,s,GO,8,1);
}
function trap(x,y,lab='',tp='яма'){
  const C={яма:RE,газ:'#8b8000',дріт:'#8b5000',шип:RE}[tp]||RE;
  g.fillStyle=C;g.beginPath();
  g.moveTo(x,y-7);g.lineTo(x+7,y);g.lineTo(x,y+7);g.lineTo(x-7,y);
  g.closePath();g.fill();
  g.strokeStyle='rgba(255,255,255,0.65)';g.lineWidth=1.2;
  g.beginPath();g.moveTo(x-5,y-5);g.lineTo(x+5,y+5);g.stroke();
  g.beginPath();g.moveTo(x+5,y-5);g.lineTo(x-5,y+5);g.stroke();
  if(lab){g.fillStyle=C;t(x,y+17,lab,C,6,0,'center',1)}
}
function sdoor(x,y,hz=1){
  for(let i=0;i<4;i++){
    g.fillStyle=GD+'cc';
    hz?g.fillRect(x+i*7-2,y-2,5,4):g.fillRect(x-2,y+i*7-2,4,5);
  }
}
function glow(cx,cy){
  [[50,0.07],[36,0.13],[24,0.2],[14,0.28]].forEach(([r,a])=>{
    g.fillStyle=`rgba(180,150,60,${a})`;
    g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.fill();
  });
  g.strokeStyle=GD+'70';g.lineWidth=0.8;
  [38,26,16].forEach(r=>{
    g.setLineDash([3,2]);g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.stroke();
  });
  g.setLineDash([]);
  g.fillStyle='#b8a870';g.strokeStyle=GO;g.lineWidth=1.5;
  g.beginPath();g.roundRect(cx-8,cy-16,16,30,2);g.fill();g.stroke();
  g.fillStyle='#d0c890';g.beginPath();g.roundRect(cx-5,cy-12,10,22,2);g.fill();
  [[9,7],[-11,10],[5,-9]].forEach(([ox,oy])=>{
    g.fillStyle=RD+'88';g.beginPath();g.ellipse(cx+ox,cy+oy,4,2,ox*.1,0,Math.PI*2);g.fill();
  });
  t(cx,cy+22,'☆ АРТЕФАКТ',GO,7,1);
}
function seal(x,y){
  g.fillStyle=RE;g.fillRect(x-3,y-20,6,40);
  [13,8,4].forEach(r=>{g.strokeStyle=RE;g.lineWidth=1;g.beginPath();g.arc(x,y,r,0,Math.PI*2);g.stroke()});
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    g.beginPath();g.moveTo(x+5*Math.cos(a),y+5*Math.sin(a));
    g.lineTo(x+13*Math.cos(a),y+13*Math.sin(a));
    g.strokeStyle=RE;g.lineWidth=1.5;g.stroke();
  }
}
function regRoom(x,y,w,h){
  bx(x,y,w,h,'#0a0603','#3a1808',3);
  const cx=x+w/2,cy=y+h/2;
  [[x+18,y+18],[x+w-18,y+18],[x+18,y+h-18],[x+w-18,y+h-18]].forEach(([px,py])=>{
    g.fillStyle='#2a1808';g.strokeStyle='#4a3020';g.lineWidth=1.5;
    g.beginPath();g.arc(px,py,7,0,Math.PI*2);g.fill();g.stroke();
    for(let s=0;s<7;s++){
      const tv=s/7;
      g.fillStyle='#3a2810';g.beginPath();
      g.arc(px+tv*(cx-px),py+tv*(cy-py),2,0,Math.PI*2);g.fill();
    }
  });
  [50,36,24,14].forEach(r=>{g.fillStyle='#040302';g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.fill()});
  t(cx,cy-6,'не намагайся',TD,7,0,'center',1);
  t(cx,cy+6,'дізнатись що там',TD,7,0,'center',1);
  badge(x+12,y+14,'3B');
  t(cx,y+h-8,'ПІДВАЛ РЕГУЛЯТОРА',TD,8,0,'center');
}

// ── МАЛЮЄМО ──

// фон
g.fillStyle=BG;g.fillRect(0,0,W,H);
// сітка
g.strokeStyle='#0e0b08';g.lineWidth=0.4;
for(let x=0;x<W;x+=16){g.beginPath();g.moveTo(x,0);g.lineTo(x,H);g.stroke()}
for(let y=0;y<H;y+=16){g.beginPath();g.moveTo(0,y);g.lineTo(W,y);g.stroke()}

// ══════════ РІВЕНЬ 1 ══════════
const X1=8;
t(195,18,'РІВЕНЬ 1: ВХІД',TX,11,1);

// 1A
bx(X1,28,80,80);badge(X1+12,40,'1A');
t(X1+40,66,'ПРИХОВАНИЙ',TX,8,1);t(X1+40,78,'ВХІД',TX,8,1);t(X1+40,90,'4×4м',TD,7,0,'center',1);
g.strokeStyle=GD;g.lineWidth=1.5;g.setLineDash([7,4]);
g.beginPath();g.moveTo(X1,28);g.lineTo(X1+80,28);g.stroke();g.setLineDash([]);
t(X1+2,24,'← кн.шафа',GD,7,0,'left',1);
cr(X1+80,55,28,16); // 1A→1B
bx(X1+108,28,120,110);badge(X1+120,40,'1B');
t(X1+168,75,'КІМНАТА',TX,8,1,'center');t(X1+168,87,'ВАРТИ',TX,8,1,'center');t(X1+168,99,'6×8м',TD,7,0,'center',1);
t(X1+125,120,'⛓',TX,9);g.fillStyle='#333';g.beginPath();g.arc(X1+205,122,4,0,Math.PI*2);g.fill();
cr(X1+228,58,44,16);  // 1B→T
cr(X1+272,14,28,190); // T vert
t(X1+286,110,'T',TX,9,1);
// тупик
bx(X1+272,4,28,10,'#120e0a','#201810',1);
g.strokeStyle='#303020';g.lineWidth=1.5;
g.beginPath();g.moveTo(X1+272,4);g.lineTo(X1+300,14);g.stroke();
g.beginPath();g.moveTo(X1+300,4);g.lineTo(X1+272,14);g.stroke();
t(X1+286,12,'ТУПИК',TD,6,1);
// T1 пастка
trap(X1+286,168,'T1: яма','яма');t(X1+248,178,'ЛІВА!',RE,7,0,'right',1);
// бічна гілка
cr(X1+300,62,44,16);trap(X1+322,70,'T2','дріт');
bx(X1+344,36,110,90,'#151008');
t(X1+399,80,'ПІДСОБНЕ',TX,7,1);t(X1+399,92,'СКЛЕПІННЯ',TX,7,1);t(X1+399,108,'порожньо? ні.',RE,7,0,'center',1);
// стрілка до Р2
cr(X1+272,204,28,46);t(X1+286,262,'▼ Р.2',GO,9,1);

// ══ РОЗДІЛЬНИК ══
const D1=480;
g.strokeStyle=OUT+'50';g.lineWidth=1.5;g.setLineDash([5,4]);
g.beginPath();g.moveTo(D1,0);g.lineTo(D1,H);g.stroke();g.setLineDash([]);
g.save();g.translate(D1+5,H/2);g.rotate(-Math.PI/2);t(0,0,'Р.1→Р.2',TD,8);g.restore();

// ══════════ РІВЕНЬ 2 ══════════
const X2=496;
t(X2+280,18,'РІВЕНЬ 2: АРХІВ',TX,11,1);

// Вестибюль
bx(X2,28,90,64);t(X2+45,56,'ВЕСТИ-',TX,8,1);t(X2+45,68,'БЮЛЬ',TX,8,1);
cr(X2+28,92,28,46);trap(X2+42,120,'T3:газ','газ');t(X2,136,'← ЛІВА!',RE,7,0,'left',1);

// Вх. корид. (горизонт. з Р1)
cr(X2,66,0,0); // немає — вже з'єднано через Р.1 вертик.

// Великий сховок 2A (ГОЛОВНА КІМНАТА)
bx(X2,138,430,176,FL,OUTA,2.5);badge(X2+14,150,'2A');
t(X2+215,220,'ВЕЛИКИЙ СХОВОК  8×20м',TX,9,1);
t(X2+215,234,'стелажі по периметру',TD,7,0,'center',1);
for(let i=0;i<23;i++){
  g.fillStyle='#302818';g.strokeStyle='#3a3020';g.lineWidth=0.5;
  g.fillRect(X2+16+i*16,142,13,7);g.strokeRect(X2+16+i*16,142,13,7);
  g.fillRect(X2+16+i*16,304,13,7);g.strokeRect(X2+16+i*16,304,13,7);
}
glow(X2+215,248);

// таємний хід → 2B
sdoor(X2+430,228,0);t(X2+418,222,'< таємний хід',GD,7,0,'right',1);
cr(X2+430,200,14,80);
bx(X2+444,152,126,126);badge(X2+456,164,'2B');
t(X2+507,200,'КАБІНЕТ',TX,8,1);t(X2+507,212,'СЕБАСТЬЯНА',TX,8,1);t(X2+507,224,'4×5м',TD,7,0,'center',1);
trap(X2+458,172,'T4','дріт');t(X2+468,238,'♦ костюм',TX,8);t(X2+468,252,'🪞 до стіни',TD,7);

// кор → 2C та → Р3
cr(X2+80,314,28,56);trap(X2+94,336,'T5:шип','шип');
cr(X2+140,314,28,56);trap(X2+154,358,'T6:газ','газ');
t(X2+122,368,'ЛІВА!',RE,7,0,'center',1);
bx(X2+48,370,162,96);badge(X2+62,382,'2C');
t(X2+129,410,'ПОРОЖНЯ КІМНАТА',TX,8,1);t(X2+129,422,'3×3м',TD,7,0,'center',1);
g.fillStyle='#2a1808';g.strokeStyle='#4a3020';g.lineWidth=1.5;
g.fillRect(X2+115,430,28,18);g.strokeRect(X2+115,430,28,18);
t(X2+129,452,'???',RE,13,1);
t(X2+168,482,'▼ Р.3',GO,9,1);
cr(X2+154,370,28,60);

// ══ РОЗДІЛЬНИК ══
const D2=1056;
g.strokeStyle=OUT+'50';g.lineWidth=1.5;g.setLineDash([5,4]);
g.beginPath();g.moveTo(D2,0);g.lineTo(D2,H);g.stroke();g.setLineDash([]);
g.save();g.translate(D2+5,H/2);g.rotate(-Math.PI/2);t(0,0,'Р.2→Р.3',TD,8);g.restore();

// ══════════ РІВЕНЬ 3 ══════════
const X3=1072;
t(X3+210,18,'РІВЕНЬ 3: ГЛИБИНА',TX,11,1);

// кор з Р2
cr(X3+28,28,28,90);

// Затоплений прохід
bx(X3-112,90,112,80,BF,BL,1.5);
t(X3-56,126,'ЗАТОПЛЕНИЙ',BL,8,1);t(X3-56,140,'ПРОХІД',BL,8,1);t(X3-56,154,'вода 1.5м',BL+'aa',7,0,'center',1);
t(X3-112,184,'→ під Хейзмуром',BL+'88',7,0,'left',1);

// 3A
bx(X3,118,160,110);badge(X3+12,130,'3A');
t(X3+80,158,'ПЕРЕДКІМНАТА',TX,8,1);t(X3+80,170,'РЕГУЛЯТОРА',TX,8,1);t(X3+80,182,'5×5м',TD,7,0,'center',1);
// кривавна печатка
seal(X3+160,188);
t(X3+168,173,'КРИВАВНА',RE,7,1,'left');t(X3+168,183,'ПЕЧАТКА',RE,7,0,'left');
t(X3+168,196,'тільки кров',RE,7,0,'left',1);t(X3+168,206,'Ключника',RE,7,0,'left',1);

// кор 3A→3B
cr(X3+160,152,18,48);
// Підвал Регулятора
regRoom(X3+178,90,198,360);

// Тунель
cr(X3+376,168,50,28);
g.strokeStyle=TD;g.lineWidth=1.5;g.setLineDash([5,5]);
g.beginPath();g.moveTo(X3+426,182);g.lineTo(X3+460,182);g.stroke();g.setLineDash([]);
t(X3+376,162,'→ невідомо куди',TD,7,0,'left',1);t(X3+376,190,'стіни не природні',RE,7,0,'left',1);

// ══ НОТАТКИ ══
t(8,H-50,'"Третій коридор — не ходи. Я ходив. Не ходи."',RE,8,0,'left',1);
t(8,H-38,'"Після печатки компас не працює. Хтось приходив сюди до нас."',TD,7,0,'left',1);

// ══ ЛЕГЕНДА ══
g.fillStyle='#0d0b08';g.strokeStyle=OUT;g.lineWidth=1;
g.fillRect(4,H-28,540,24);g.strokeRect(4,H-28,540,24);
[['⬥ Пастка/яма',RE],['⬥ Газ','#8b8000'],['--- Таємний хід',GD],
 ['❋ Печатка',RE],['▓ Стелажі',TD],['██ Затоплений',BL],['● Тунель невідомо',TD]
].forEach(([l,c],i)=>{t(14+i*74,H-11,l,c,7,0,'left')});

// ══ ЗАГОЛОВОК ══
g.fillStyle='#0d0b08';g.strokeStyle=OUT;g.lineWidth=1;
g.fillRect(W/2-255,2,510,28);g.strokeRect(W/2-255,2,510,28);
t(W/2,14,'ЧОРНИЙ АРХІВ — Схема Підземного Комплексу',TX,12,1);
t(W/2,25,'Мал. невідомий. Знайдено у кишені мертвого дослідника.',TD,7,0,'center',1);
</script></body></html>
